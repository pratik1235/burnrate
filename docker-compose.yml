services:
  burnrate:
    build: .
    image: burnrate:latest
    ports:
      - "8000:8000"
    volumes:
      - burnrate_data:/data
      # Mount your statements folder (read-only is sufficient)
      # Uncomment and adjust the path below:
      # - ~/Documents/statements:/watch:ro
    environment:
      - BURNRATE_DATA_DIR=/data
      - BURNRATE_STATIC_DIR=/app/static
    restart: unless-stopped

volumes:
  burnrate_data:
