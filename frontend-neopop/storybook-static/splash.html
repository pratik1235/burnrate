<!DOCTYPE html>
<!--
  Plain HTML (no React): The splash is a separate Tauri window loaded from /splash.html.
  The main React app loads in the hidden "main" window. The splash cannot use the main
  window's React runtime. Using React would require a separate React build for splash,
  adding complexity and startup time. Plain HTML/CSS loads instantly with zero bundle overhead.
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burnrate Splash</title>
  <style>
    :root {
      --bg: #0D0D0D;
      --text: #FFFFFF;
      --accent: #FF8744;
      --border: rgba(255, 255, 255, 0.1);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Rounded container to match macOS window curvature */
    .window {
      position: absolute;
      inset: 0;
      background-color: var(--bg);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.8s ease-out;
    }

    .logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 135, 68, 0.1);
      border: 1px solid var(--accent);
      /* NeoPOP style shadow */
      box-shadow: 4px 4px 0px var(--accent);
    }

    .logo-container svg {
      width: 48px;
      height: 48px;
    }

    .app-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: lowercase;
    }

    .loader-bar {
      width: 140px;
      height: 2px;
      background: var(--border);
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    .loader-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 50%;
      background: var(--accent);
      animation: slide 1.5s infinite ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slide {
      from {
        left: -50%;
      }

      to {
        left: 100%;
      }
    }

    /* Subtle gradient background like the main app */
    .window::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 135, 68, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="container">
      <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true" role="img">
          <defs>
            <linearGradient id="fg" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#E85D26" />
              <stop offset="100%" stop-color="#FFB347" />
            </linearGradient>
          </defs>
          <path fill="url(#fg)"
            d="M16 2C14.5 6 12 9.5 12 13.5c0 1.2.4 2.3 1 3.2-.6 1-1 2.2-1 3.3 0 3.3 2.7 6 6 6s6-2.7 6-6c0-1.8-.8-3.4-2-4.5.3-1 .5-2 .5-3C22.5 8 19 4 16 2zm0 22c-2.2 0-4-1.8-4-4 0-1.5.8-2.8 2-3.5-.1.5-.1 1 0 1.5.2 1.1.8 2 2 2s1.8-.9 2-2c.1-.5.1-1 0-1.5 1.2.7 2 2 2 3.5 0 2.2-1.8 4-4 4z" />
        </svg>
      </div>
      <div class="app-name">burnrate</div>
      <div class="loader-bar">
        <div class="loader-progress"></div>
      </div>
    </div>
  </div>
</body>

</html>
